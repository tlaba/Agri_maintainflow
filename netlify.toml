# Netlify configuration for MaintainFlow Ag (static PWA, no build step)
[build]
  publish = "."
  command = ""

# Single-page app: route everything to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache the service worker or the HTML shell (so updates ship instantly)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=0, must-revalidate"

# Fingerprinted static assets can cache hard (the SW handles versioning anyway)
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
